<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Compress PDF - Smaller PDFs in your browser!</title>
  <meta name="description"
    content="Free, In-browser, Privacy friendly PDF Compressor. Your files doesn't leave your browser." />
  <link rel="shortcut icon" type="image/x-icon" href="compresspdf-favicon.ico" />
  <link rel="icon" type="image/x-icon" href="compresspdf-favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script defer src="js/pdfkit-standalone-0.10.0.js"></script>
  <script defer src="js/blob-stream-0.1.3.js"></script>
  <script src="js/pdf.min-2.5.207.js"></script>
  <script src="js/FileSaver.min-2.0.4.js"></script>
  <script src="js/sortable.min.1.10.2.js"></script>
</head>

<body>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #e84545;
      --accent-light: rgba(232, 69, 69, 0.1);
      --bg: #f5f5f7;
      --card-bg: #ffffff;
      --text: #1a1a2e;
      --text-muted: #6b7280;
      --border: #e5e7eb;
      --radius: 14px;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      color: var(--text);
    }

    /* Header */
    .page-header {
      text-align: center;
      margin-bottom: 32px;
    }
    .page-header h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    .page-header h1 span { color: var(--accent); }
    .page-header p {
      margin-top: 8px;
      font-size: 0.875rem;
      color: var(--text-muted);
    }
    .privacy-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      margin-top: 10px;
      background: var(--accent-light);
      color: var(--accent);
      font-size: 0.72rem;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 999px;
    }

    /* Card */
    .card {
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 36px 40px;
      width: 100%;
      max-width: 560px;
    }

    /* Drop zone */
    .drop-zone {
      position: relative;
      border: 2px dashed var(--border);
      border-radius: 10px;
      padding: 32px 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    .drop-zone:hover {
      border-color: var(--accent);
      background: var(--accent-light);
    }
    .drop-zone svg {
      width: 38px;
      height: 38px;
      color: var(--accent);
      margin-bottom: 12px;
    }
    .drop-zone-label {
      font-size: 0.925rem;
      font-weight: 500;
    }
    .drop-zone-sub {
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-top: 4px;
    }
    #pdf_input {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    /* File list */
    #selected_pdf_container { margin-top: 14px; }
    #selected_pdf_list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    #selected_pdf_list li {
      list-style: none;
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 0.8rem;
    }
    .ghost-class {
      background: var(--accent-light) !important;
      border-color: var(--accent) !important;
    }
    .handle {
      cursor: grab;
      content: url("res/ic_fluent_drag_24_regular.svg");
      width: 18px;
      height: 18px;
      opacity: 0.4;
      flex-shrink: 0;
    }

    /* Controls row */
    .controls-row {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-top: 24px;
    }

    /* Slider */
    .slider-group { flex: 1; }
    .slider-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .slider-label .label-text {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    #compress_input_output {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--accent);
      background: var(--accent-light);
      padding: 2px 8px;
      border-radius: 999px;
    }
    #compress_input {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 4px;
      border-radius: 2px;
      background: var(--border);
      outline: none;
      cursor: pointer;
    }
    #compress_input::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-light);
      cursor: pointer;
      transition: box-shadow 0.2s;
    }
    #compress_input::-webkit-slider-thumb:hover {
      box-shadow: 0 0 0 6px var(--accent-light);
    }

    /* Button */
    #compress_pdf {
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 12px 22px;
      background: var(--accent);
      color: #fff;
      font-family: inherit;
      font-size: 0.875rem;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 2px 8px rgba(232,69,69,0.35);
      animation: none;
    }
    #compress_pdf:hover:not(:disabled) {
      opacity: 0.9;
      transform: translateY(-1px);
      box-shadow: 0 4px 14px rgba(232,69,69,0.45);
    }
    #compress_pdf:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    @keyframes loading {
      0%   { box-shadow: 0 2px 10px rgba(66,133,244,0.55);  background: #4285f4; }
      33%  { box-shadow: 0 2px 10px rgba(219,68,55,0.55);   background: #db4437; }
      66%  { box-shadow: 0 2px 10px rgba(244,180,0,0.55);   background: #f4b400; }
      100% { box-shadow: 0 2px 10px rgba(15,157,88,0.55);   background: #0f9d58; }
    }

    /* Footer */
    .page-footer {
      margin-top: 24px;
      font-size: 0.72rem;
      color: var(--text-muted);
      text-align: center;
    }
    .page-footer a { color: var(--accent); text-decoration: none; }
    .page-footer a:hover { text-decoration: underline; }
  </style>

  <header class="page-header">
    <h1>Compress <span>PDF</span></h1>
    <p>Reduce PDF file size entirely in your browser. Nothing is uploaded to any server.</p>
    <span class="privacy-badge">
      <svg xmlns="http://www.w3.org/2000/svg" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      100% private &mdash; files never leave your device
    </span>
  </header>

  <main class="card">
    <div class="drop-zone">
      <input id="pdf_input" type="file" accept="application/pdf" multiple />
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="12" y1="18" x2="12" y2="12"/>
        <line x1="9" y1="15" x2="15" y2="15"/>
      </svg>
      <div class="drop-zone-label">Click to choose PDF files</div>
      <div class="drop-zone-sub">Supports multiple files &mdash; drag handles below to reorder</div>
    </div>

    <div id="selected_pdf_container">
      <div id="selected_pdf_list" title="Hold and drag the handle to reorder pages in the output PDF"></div>
    </div>

    <div class="controls-row">
      <div class="slider-group">
        <div class="slider-label">
          <span class="label-text">Compression</span>
          <span id="compress_input_output">0.5</span>
        </div>
        <input id="compress_input" title="Compression ratio — higher = more compression" type="range" min="0" max="1" value="0.5" step="0.1" />
      </div>
      <div id="compress_pdf_container">
        <button id="compress_pdf" title="Compress and combine selected PDF files in the specified order">
          <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="8 17 12 21 16 17"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.88 18.09A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.29"/></svg>
          Compress PDF
        </button>
      </div>
    </div>
  </main>

  <footer class="page-footer">
    Open source &mdash; built with <a href="https://mozilla.github.io/pdf.js/" target="_blank" rel="noopener">PDF.js</a> &amp; <a href="http://pdfkit.org/" target="_blank" rel="noopener">PDFKit</a>
  </footer>

  <div style="max-width:0;max-height:0;overflow:hidden">
    <canvas id="page_canvas"></canvas>
  </div>

  <script>
    function setLoading() {
      var compress_pdf = document.getElementById("compress_pdf");
      if (compress_pdf.style.animation == "none") {
        console.log("Loading...");
      } else {
        compress_pdf.style.animation = "loading 2s infinite";
      }
      compress_pdf.innerText = "Compressing...";
      compress_pdf.disabled = true;
    }

    function resetLoading() {
      var compress_pdf = document.getElementById("compress_pdf");
      compress_pdf.style.animation = "none";
      compress_pdf.disabled = false;
      compress_pdf.innerText = "Compress PDF";
    }

    function onPDFCompressed() {
      var pdf_input = document.getElementById("pdf_input");
      pdf_input.value = "";
      resetAll();
    }

    function resetAll() {
      resetTempArrays();
      //clearPDFList();
      resetLoading();
    }

    function addFileEntry(file_name) {
      var list = document.getElementById("selected_pdf_list");
      var entry = document.createElement("li");
      var img = new Image();
      img.classList.add("handle");
      entry.append(img);
      var space = document.createTextNode("\u00A0");
      entry.append(space);
      entry.append(file_name);
      list.appendChild(entry);
    }

    var selected_pdf_list = document.getElementById("selected_pdf_list");
    var sortable_list = new Sortable(selected_pdf_list, {
      animation: 150,
      ghostClass: "ghost-class",
      onSort: function (event) {
        updateFileListOnSort(event.to);
      },
    });

    var tenet = [];
    var fc = 0;

    var input_file_names = [];
    var ordered_input_files = [];
    var ordered_index = [];
    var sorted = false;

    var input_scale = 1,
      input_quality = 0.5,
      input_quality_ui = 0.5,
      input_format = "image/jpeg";

    var pdf_input = document.getElementById("pdf_input");
    pdf_input.addEventListener("input", onInputPDF);

    var compress_pdf = document.getElementById("compress_pdf");
    compress_pdf.addEventListener("click", onProcessInputPDF);

    var quality_input = document.getElementById("compress_input");
    quality_input.addEventListener("input", onQualityInput);

    // var tenet_pdf = document.getElementById("tenet");
    // tenet_pdf.addEventListener("click", processImageData);

    function onQualityInput() {
      input_quality_ui = Number(this.value);
      var output_quality = document.getElementById("compress_input_output");
      // output_quality.value = input_quality_ui;
      output_quality.innerText = input_quality_ui;
      input_quality = 1 - input_quality_ui;
    }

    function resetTempArrays() {
      input_file_names = [];
      ordered_input_files = [];
      ordered_index = [];
      sorted_file_names = [];
      tenet = [];
      sorted = false;
    }

    function onInputPDF() {
      resetTempArrays();
      clearPDFList();

      fc = this.files.length;

      for (i = 0; i < fc; i++) {
        var file = this.files[i];

        if (!file) {
          return;
        }

        if (file.type != "application/pdf") {
          pdfName = null;
          pdfFileObject = null;
          console.log(
            file.name + " - Unsupported file format, Select a PDF file!!"
          );
          selected_file_name = file.name + " - Unsupported file format!!";
          alert(selected_file_name);
          return;
        }
      }

      ordered_input_files = Array.from(this.files);

      for (j = 0; j < fc; j++) {
        input_file_names.push(this.files[j]["name"]);
      }

      // console.log(ordered_input_files);
      generateFileList();
    }

    function generateFileList() {
      for (i = 0; i < ordered_input_files.length; i++) {
        addFileEntry(ordered_input_files[i]["name"]);
      }
    }

    function compareFileLists(oldList, newList) {
      var indexList = [];
      var i = 0,
        len = oldList.length;
      while (i < len) {
        indexList.push(newList.indexOf(oldList[i]));
        i++;
      }

      return indexList;
    }

    function sortFiles(fileListRef, sortedIndex) {
      var fileList = Array.from(fileListRef);
      var i = 0;
      len = sortedIndex.length;

      while (i < len) {
        while (sortedIndex[i] != i) {
          var currTgtIdx = sortedIndex[sortedIndex[i]];
          var currTgtData = fileList[sortedIndex[i]];

          sortedIndex[sortedIndex[i]] = sortedIndex[i];
          fileList[sortedIndex[i]] = fileList[i];

          sortedIndex[i] = currTgtIdx;
          fileList[i] = currTgtData;
        }
        i++;
      }
      return fileList;
    }

    function updateFileListOnSort(file_list_div) {
      sorted_file_names = [];
      var items = file_list_div.childNodes;
      for (i = 0; i < items.length; i++) {
        sorted_file_names.push(items[i].textContent.trim());
      }

      var finalIndex = compareFileLists(input_file_names, sorted_file_names);
      // ordered_input_files = sortFiles(ordered_input_files, finalIndex);
      ordered_index = Array.from(finalIndex);
      // console.log(ordered_index);
    }

    function clearPDFList() {
      var list = document.getElementById("selected_pdf_list");
      list.textContent = "";
    }

    function generateMetadata(file) {
      pdfName = file["name"];
      pdfFileObject = file;
      selected_file_name = pdfName;
    }

    function getFileToProcessed() {
      return ordered_input_files.shift();
    }

    function checkFileProcessProgress() {
      if (ordered_input_files.length == 0) {
        processImageData();
      } else {
        onProcessInputPDF();
      }
    }

    function checkFiles() {
      return ordered_input_files.length;
    }

    function sortFileList() {
      if (!sorted) {
        var sorted_files = sortFiles(ordered_input_files, ordered_index);
        // console.log(sorted_files);
        ordered_input_files = Array.from(sorted_files);
        sorted = true;
      }
    }

    function onProcessInputPDF() {
      if (!checkFiles()) {
        alert("Select PDF Files to Compress 🙂");
        return;
      }

      setLoading();

      sortFileList();

      // console.log(ordered_input_files);

      var file = getFileToProcessed();

      if (file) {
        generateMetadata(file);
      } else {
        return;
      }

      if (!pdfFileObject) {
        return;
      }

      console.log("Loading selected file: " + pdfName);

      const reader = new FileReader();

      reader.onload = function (e) {
        var url = e.target.result;
        pdf2img(url);
      };
      if (pdfFileObject) {
        reader.readAsDataURL(pdfFileObject);
      } else {
        console.log(
          "Error reading file: " + pdfName + " Choose file(s) again..."
        );
      }
    }

    pdfjsLib.GlobalWorkerOptions.workerSrc = "js/pdf.worker.min-2.5.207.js";

    var pdfDoc = null,
      pageNum = 1,
      pdfFileObject = null,
      pageRendering = false,
      pageCount = 0,
      pageNumPending = null,
      pageScale = input_scale,
      pageQuality = input_quality,
      pageQualityUI = input_quality_ui,
      pageFormat = input_format,
      imgData = null,
      pdfName = "doc",
      selected_file_name = "";

    var canvas = document.getElementById("page_canvas");
    var ctx = canvas.getContext("2d");

    function pdf2img(pdf_url) {
      readPDF(pdf_url).then(
        () => downloadAll(),
        () => {
          console.log("Error reading PDF... May be an encrypted one [-_^]");
        }
      );
    }

    function readPDF(url) {
      return new Promise((resolve, reject) => {
        var loadingTask = pdfjsLib.getDocument(url);
        loadingTask.promise.then(
          function (pdfDoc_) {
            pdfDoc = pdfDoc_;
            resetPDFMetaStore(pdfDoc.numPages);
            console.log("PDF Loaded: " + pdfName);
            selected_file_name += " - " + pageCount + " Pages";
            resolve(1);
          },
          () => reject(1)
        );
      });
    }

    function resetPDFMetaStore(numPages) {
      pageCount = numPages;
      imgData = {};
      pageNumPending = [];
      pageScale = input_scale;
      pageQuality = input_quality;
      pageQualityUI = input_quality_ui;
      pageFormat = input_format;
    }

    function getOutputPdfName() {
      if (fc == 1) {
        return pdfName.split(".pdf")[0] + "_min_" + pageQualityUI + ".pdf";
      } else {
        return "Comb_Doc" + "_min_" + pageQualityUI + ".pdf";
      }
    }

    /**
     * Get page info from document, resize canvas accordingly, and render page.
     * @param num Page number.
     */
    function renderPage(num) {
      pageRendering = true;
      // Using promise to fetch the page
      pdfDoc.getPage(num).then(function (page) {
        var viewport = page.getViewport({
          scale: pageScale
        });
        canvas.height = viewport.height;
        canvas.width = viewport.width;

        // Render PDF page into canvas context
        var renderContext = {
          canvasContext: ctx,
          viewport: viewport,
        };
        var renderTask = page.render(renderContext);

        // Wait for rendering to finish
        renderTask.promise.then(function () {
          data = canvas.toDataURL(pageFormat, pageQuality);

          imgData[num] = data;
          console.log("Completed page: " + num);
          pageRendering = false;

          if (pageNumPending !== null && pageNumPending.length != 0) {
            // New page rendering is pending
            renderPage(pageNumPending.shift());
          } else {
            if (Object.keys(imgData).length == pageCount) {
              tenet.push(JSON.parse(JSON.stringify(imgData)));
              console.log("Rendering complete");
              checkFileProcessProgress();
              //processImageData();
            }
          }
        });
      });

      console.log("Processing page: " + num);
    }

    /**
     * If another page rendering in progress, waits until the rendering is
     * finised. Otherwise, executes rendering immediately.
     */
    function queueRenderPage(num) {
      if (pageRendering) {
        pageNumPending.push(num);
      } else {
        renderPage(num);
      }
    }

    function downloadAll() {
      for (i = 1; i <= pageCount; i++) {
        queueRenderPage(i);
      }
    }

    function getImgObj(data) {
      return new Promise(function (resolve, reject) {
        var img = new Image();
        img.onload = function () {
          resolve(img);
        };
        img.src = data;
      });
    }

    async function processImageData() {
      var options = {
        autoFirstPage: false,
        compress: false,
      };

      const doc = new PDFDocument(options);

      doc.info = {
        Title: "ImageDoc.pdf",
        Author: "Img2Pdf",
        Keywords: "https://opentoolkit.github.io/Img2Pdf/",
      };
      const stream = doc.pipe(blobStream());

      for (let k = 0; k < tenet.length; k++) {
        var imgData = tenet[k];
        console.log("PDF %d: %d pages", k + 1, Object.keys(imgData).length);

        for (let i = 1; i <= Object.keys(imgData).length; i++) {
          img_data = await getImgObj(imgData[i]);
          doc.addPage({
            size: [img_data.width, img_data.height],
          });
          doc.image(img_data.src, 0, 0);
        }
      }

      doc.end();

      stream.on("finish", function () {
        var output_blob = stream.toBlob("application/pdf");
        saveAs(output_blob, getOutputPdfName());
        onPDFCompressed();
      });
    }
  </script>
</body>

</html>
